name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install native graphics dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgl1-mesa-dev libx11-dev libxi-dev

      - name: Install Rust components
        run: rustup component add clippy rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test
